<div class="layout-container">
  <mat-toolbar color="primary" class="navbar mat-elevation-z4">
    <div class="brand" routerLink="/tickets" style="cursor: pointer">
      <mat-icon>confirmation_number</mat-icon>
      <span>TicketFlow</span>
    </div>

    <div class="nav-links">
      <button
        mat-button
        *ngIf="userRole === 'ADMIN'"
        routerLink="/admin/staff/new"
      >
        <mat-icon>person_add</mat-icon> Create Staff
      </button>
    </div>

    <span class="spacer"></span>

    <div class="user-actions">
      <button mat-button><mat-icon>person</mat-icon> {{ userRole }}</button>

      <button mat-icon-button matTooltip="Logout" (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-toolbar>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
