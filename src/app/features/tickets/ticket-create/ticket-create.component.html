<h2 mat-dialog-title>Open New Ticket</h2>

<mat-dialog-content>
  <form [formGroup]="ticketForm" class="ticket-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Problem Title</mat-label>
      <input
        matInput
        formControlName="title"
        placeholder="Ex: Error issuing invoice."
      />
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Category</mat-label>
        <mat-select formControlName="category">
          <mat-option value="FINANCE">Finance</mat-option>
          <mat-option value="BUG">Bug</mat-option>
          <mat-option value="QUESTION">Question</mat-option>
          <mat-option value="ACCESS">Access</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Detailed description</mat-label>
      <textarea
        matInput
        formControlName="description"
        rows="4"
        placeholder="Describe what is happening..."
      ></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close [disabled]="isLoading">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    (click)="onSubmit()"
    [disabled]="ticketForm.invalid || isLoading"
  >
    {{ isLoading ? "Saving..." : "Create ticket" }}
  </button>
</mat-dialog-actions>
