<div class="page-container">
  <mat-card class="table-card">
    <mat-card-header class="header-actions">
      <mat-card-title>Fila de Chamados</mat-card-title>
      <button mat-flat-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon> Novo Chamado
      </button>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="isLoading" class="loading-state">Carregando chamados...</div>

      <table
        mat-table
        [dataSource]="dataSource"
        class="mat-elevation-z0"
        *ngIf="!isLoading"
      >
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let ticket">{{ ticket.id }}</td>
        </ng-container>

        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Título</th>
          <td mat-cell *matCellDef="let ticket" class="title-cell">
            <strong>{{ ticket.title }}</strong>
          </td>
        </ng-container>

        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Categoria</th>
          <td mat-cell *matCellDef="let ticket">{{ ticket.category }}</td>
        </ng-container>

        <ng-container matColumnDef="priority">
          <th mat-header-cell *matHeaderCellDef>Prioridade</th>
          <td mat-cell *matCellDef="let ticket">
            <mat-chip-set>
              <mat-chip [ngClass]="'priority-' + ticket.priority.toLowerCase()">
                {{ ticket.priority }}
              </mat-chip>
            </mat-chip-set>
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let ticket">
            <mat-chip-set>
              <mat-chip [ngClass]="'status-' + ticket.status.toLowerCase()">
                {{ ticket.status }}
              </mat-chip>
            </mat-chip-set>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="actions-header">
            Ações
          </th>
          <td mat-cell *matCellDef="let ticket" class="actions-cell">
            <button
              mat-icon-button
              color="primary"
              matTooltip="Visualizar Detalhes"
              [routerLink]="['/tickets', ticket.id]"
            >
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          class="ticket-row"
        ></tr>
      </table>

      <div *ngIf="!isLoading && dataSource.length === 0" class="empty-state">
        Nenhum chamado encontrado na fila.
      </div>
    </mat-card-content>
  </mat-card>
</div>
