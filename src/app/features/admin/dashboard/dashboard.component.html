<div class="dashboard-container">
  <header class="dashboard-header">
    <h1>Management Dashboard</h1>
    <p>Overview of support operations and ticket metrics.</p>
  </header>

  <div *ngIf="isLoading" class="loading-shade">
    <mat-spinner></mat-spinner>
  </div>

  <div *ngIf="!isLoading && stats">
    <mat-grid-list
      cols="4"
      rowHeight="120px"
      gutterSize="20px"
      class="stats-grid"
    >
      <mat-grid-tile>
        <mat-card class="stat-card open">
          <mat-icon>fiber_new</mat-icon>
          <div class="stat-content">
            <span class="label">Open</span>
            <h2 class="value">{{ stats.open }}</h2>
          </div>
        </mat-card>
      </mat-grid-tile>

      <mat-grid-tile>
        <mat-card class="stat-card progress">
          <mat-icon>autorenew</mat-icon>
          <div class="stat-content">
            <span class="label">In Progress</span>
            <h2 class="value">{{ stats.inProgress }}</h2>
          </div>
        </mat-card>
      </mat-grid-tile>

      <mat-grid-tile>
        <mat-card class="stat-card waiting">
          <mat-icon>hourglass_empty</mat-icon>
          <div class="stat-content">
            <span class="label">Waiting</span>
            <h2 class="value">{{ stats.waiting }}</h2>
          </div>
        </mat-card>
      </mat-grid-tile>

      <mat-grid-tile>
        <mat-card class="stat-card resolved">
          <mat-icon>check_circle</mat-icon>
          <div class="stat-content">
            <span class="label">Resolved</span>
            <h2 class="value">{{ stats.resolved }}</h2>
          </div>
        </mat-card>
      </mat-grid-tile>
    </mat-grid-list>

    <div class="charts-row">
      <mat-card class="chart-container">
        <mat-card-header>
          <mat-card-title>Status Distribution</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="canvas-wrapper">
            <canvas
              baseChart
              [data]="pieChartData"
              [options]="pieChartOptions"
              [type]="pieChartType"
            >
            </canvas>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
